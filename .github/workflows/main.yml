name: CI/CD Pipeline - Mindly

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: mindly_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          
      - name: Install Dependencies
        working-directory: ./backend
        run: poetry install --no-root

      - name: Run Django Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/mindly_db
          SECRET_KEY: test-key-ci
          DEBUG: True
        run: poetry run python manage.py test

  test-frontend-e2e:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Cypress Run
        uses: cypress-io/github-action@v6
        env:
          # ADICIONADO: Variáveis essenciais para o App não crashar no início
          VITE_API_URL: "http://localhost:8000/api"
          VITE_GOOGLE_CLIENT_ID: "871089850123-uf6ljhm2v6qh09rbi9rr5e3f7eq1vonk.apps.googleusercontent.com"
          VITE_FIREBASE_API_KEY: "AIzaSyBu2ZPR8iIVJT7zNJ-mvPT7FD5NzoWO_VE"
          VITE_FIREBASE_AUTH_DOMAIN: "mindly-app-96bfb.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "mindly-app-96bfb"
          VITE_FIREBASE_APP_ID: "1:871089850123:web:ba40bc306e6ca228f7040e"
        with:
          working-directory: ./frontend
          start: npm run dev
          wait-on: 'http://localhost:5173'
          browser: chrome

  deploy:
    needs: test-frontend-e2e
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          echo "Disparando Deploy no Render..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}